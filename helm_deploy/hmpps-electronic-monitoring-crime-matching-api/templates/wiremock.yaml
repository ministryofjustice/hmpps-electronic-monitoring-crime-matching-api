{{- if .Values.deploy_stubs }}
{{- $mappingsGlob := "files/stubs/mappings/*" }}
{{- $baseName := "hmpps-electronic-monitoring-crime-matching-datastore-stub-data-mappings" }}

{{- range $path, $_ := $.Files.Glob $mappingsGlob }}
{{- $fileName := base $path }}
{{- $safeName := regexReplaceAll "[^a-z0-9-]" (lower (trimSuffix ".json" $fileName)) "-" }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ printf "%s-%s" $baseName $safeName | trunc 63 | trimSuffix "-" }}
data:
  {{ $fileName }}: |-
{{ $.Files.Get $path | indent 4 }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hmpps-electronic-monitoring-crime-matching-datastore-stubs
  labels:
    app.kubernetes.io/name: hmpps-electronic-monitoring-crime-matching-datastore-stubs
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hmpps-electronic-monitoring-crime-matching-datastore-stubs
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hmpps-electronic-monitoring-crime-matching-datastore-stubs
    spec:
      securityContext:
        runAsUser: 1000
      containers:
        - name: hmpps-electronic-monitoring-crime-matching-datastore-stubs
          image: wiremock/wiremock
          command: ["/docker-entrypoint.sh", "--no-request-journal", "--global-response-templating"]
          ports:
            - containerPort: 8080
          volumeMounts:
{{- range $path, $_ := $.Files.Glob $mappingsGlob }}
{{- $fileName := base $path }}
{{- $safeName := regexReplaceAll "[^a-z0-9-]" (lower (trimSuffix ".json" $fileName)) "-" }}
            - name: mappings-{{ $safeName | trunc 40 | trimSuffix "-" }}
              mountPath: /home/wiremock/mappings/{{ $fileName }}
              subPath: {{ $fileName }}
{{- end }}
          livenessProbe:
            httpGet:
              path: /__admin/mappings
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
{{- range $path, $_ := $.Files.Glob $mappingsGlob }}
{{- $fileName := base $path }}
{{- $safeName := regexReplaceAll "[^a-z0-9-]" (lower (trimSuffix ".json" $fileName)) "-" }}
        - name: mappings-{{ $safeName | trunc 40 | trimSuffix "-" }}
          configMap:
            name: {{ printf "%s-%s" $baseName $safeName | trunc 63 | trimSuffix "-" }}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: hmpps-electronic-monitoring-crime-matching-datastore-stubs
spec:
  selector:
    app.kubernetes.io/name: hmpps-electronic-monitoring-crime-matching-datastore-stubs
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
{{- end }}