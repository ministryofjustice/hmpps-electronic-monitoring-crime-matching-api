{{- if .Values.deploy_stubs }}
{{- $mappingsGlob := "files/stubs/mappings/*" }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hmpps-electronic-monitoring-crime-matching-datastore-stub-data-mappings
data:
{{ ($.Files.Glob $mappingsGlob).AsConfig | indent 2 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hmpps-electronic-monitoring-crime-matching-datastore-stubs
  labels:
    app.kubernetes.io/name: hmpps-electronic-monitoring-crime-matching-datastore-stubs
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hmpps-electronic-monitoring-crime-matching-datastore-stubs
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hmpps-electronic-monitoring-crime-matching-datastore-stubs
    spec:
      securityContext:
        runAsUser: 1000
      containers:
        - name: hmpps-electronic-monitoring-crime-matching-datastore-stubs
          image: wiremock/wiremock
          command: ["/docker-entrypoint.sh", "--no-request-journal", "--global-response-templating"]
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: mappings-volume
              mountPath: /home/wiremock/mappings
          livenessProbe:
            httpGet:
              path: /__admin/mappings
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: mappings-volume
          configMap:
            name: hmpps-electronic-monitoring-crime-matching-api-stub-data-mappings
---
apiVersion: v1
kind: Service
metadata:
  name: hmpps-electronic-monitoring-crime-matching-datastore-stubs
spec:
  selector:
    app.kubernetes.io/name: hmpps-electronic-monitoring-crime-matching-datastore-stubs
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
{{- end }}
