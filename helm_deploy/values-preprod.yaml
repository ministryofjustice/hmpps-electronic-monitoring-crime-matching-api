---
# Per environment values which override defaults in hmpps-electronic-monitoring-crime-matching-api/values.yaml

generic-service:
  replicaCount: 2

  serviceAccountName: "hmpps-em-crime-matching-preprod"

  ingress:
    host: electronic-monitoring-crime-matching-api-preprod.hmpps.service.justice.gov.uk

  env:
    APPLICATIONINSIGHTS_CONFIGURATION_FILE: "applicationinsights.dev.json"
    HMPPS_AUTH_URL: "https://sign-in-preprod.hmpps.service.justice.gov.uk/auth"
    ATHENA_OUTPUT_BUCKET: "s3://emds-test-athena-query-results-20240923095933297100000013"
    ATHENA_WORKGROUP: "placeholder"
    MFA_REQUIRED: "false"
    DATASTORE_DATABASE: "placeholder"

# CloudPlatform AlertManager receiver to route prometheus alerts to slack
# See https://user-guide.cloud-platform.service.justice.gov.uk/documentation/monitoring-an-app/how-to-create-alarms.html#creating-your-own-custom-alerts
generic-prometheus-alerts:
  alertSeverity: hmpps-em-crime-matching-alerts-nonprod
  sqsAlertsTotalMessagesThreshold: 10
  sqsAlertsOldestThreshold: 60
  sqsAlertsQueueNames:
    - hmpps-em-probation-devs-preprod-email-notifications
  sqsNumberAlertQueueNames:
    - hmpps-em-probation-devs-preprod-email-notifications-dlq
  rdsAlertsDatabases:
    cloud-platform-3b9e8faa7849429d: "Electronic Monitoring Crime Matching API Database"
