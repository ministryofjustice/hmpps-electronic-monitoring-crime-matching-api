server:
  shutdown: immediate

management.endpoint:
  health.cache.time-to-live: 0
  info.cache.time-to-live: 0

hmpps:
  sqs:
    provider: localstack
    useWebToken: false
    queues:
      audit:
        queueName: "audit"
      email:
        queueName: "email"
        subscribeTopicId: emailtopic
        dlqName: email_dlq
      matchingnotifications:
        queueName: "matching-notifications"
        subscribeTopicId: matchingnotificationstopic
    topics:
      emailtopic:
        arn: arn:aws:sns:eu-west-2:000000000000:email-topic
      matchingnotificationstopic:
        arn: arn:aws:sns:eu-west-2:000000000000:matching-notifications


services:
  hmpps-auth:
    url: "http://localhost:8090/auth"

aws:
  region: eu-west-2
  endpoint-url: http://localhost:8091
  s3:
    endpoint-url: http://localhost:4566
  athena:
    role: testIAM

spring:
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  datasource:
    url: jdbc:postgresql://localhost/testdb
    username: postgres
    password: postgres

datastore:
  output-bucket-arn: test-output-bucket
  retry-interval-ms: 10

notify:
  enabled: true
  apikey: test-key
  successfulIngestionTemplateId: 4e75981e-ba14-477e-afea-5ec111c7bf11
  failedIngestionTemplateId: 57f34eb4-7fc6-4b2b-806b-f64d7b27a497
  partialIngestionTemplateId: 02a53929-0984-4d55-bb02-94e6f10d31a8
  
email-ingestion:
  valid-emails:
    metropolitan: "test@email.com"
  mailbox-address: "shared-mailbox@email.com"
